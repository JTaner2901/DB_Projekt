<app-grid-motion gradientColor="#14151a">
  <div class="login-card">
    <div class="logo-badge">
      <i class="ti ti-aperture"></i>
    </div>

    <h1>Willkommen zurück</h1>
    <p class="subtitle">Melde dich an, um deine Fotos zu teilen</p>

    <form (ngSubmit)="onSubmit()">
      <label>
        <span>E-Mail</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="du@beispiel.de"
          required
        />
      </label>

      <label>
        <span>Passwort</span>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </label>

      <button type="submit" class="submit-btn">Anmelden</button>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>

    <p class="switch-link">
      Noch kein Konto? <a routerLink="/register">Jetzt registrieren</a>
    </p>
  </div>
</app-grid-motion>
