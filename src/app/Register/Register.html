<app-grid-motion gradientColor="#0093a5">
  <div class="register-card">
    <div class="logo-badge">
      <img src="/icon/capture-frames-icon-white.svg" alt="Capture Frames Logo" />
    </div>

    <h1>Konto erstellen</h1>
    <p class="subtitle">Werde Teil der Capture Frames Community</p>

    <form (ngSubmit)="onSubmit()">
      <label>
        <span>E-Mail</span>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="du@beispiel.de"
          required
        />
      </label>

      <label>
        <span>Passwort</span>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
        />
      </label>

      <label>
        <span>Passwort bestätigen</span>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          required
        />
      </label>

      <button type="submit" class="submit-btn">Registrieren</button>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>

    <p class="switch-link">
      Bereits ein Konto? <a routerLink="/login">Jetzt anmelden</a>
    </p>
  </div>
</app-grid-motion>
