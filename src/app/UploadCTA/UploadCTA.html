<section class="upload-cta">
  <div class="stack">
    <div
      class="stack-photo"
      *ngFor="let photo of stackedPhotos; let i = index"
      [style.--tx.px]="i * 52"
      [style.--ty.px]="i * -40"
      [style.--rot.deg]="(i - 1) * 7"
    >
      <img [src]="photo" alt="Beispielfoto" />
    </div>
  </div>

  <div class="content">
    <div class="icon-badge">
      <i class="ti ti-upload"></i>
    </div>
    <h2>Zeig der Welt deine Aufnahmen</h2>
    <p>Lade deine Fotos hoch, versieh sie mit Kamera- und Standortdaten und werde Teil der Community.</p>

    <a [routerLink]="auth.isLoggedIn() ? '/upload' : '/login'" class="cta-btn">
      {{ auth.isLoggedIn() ? 'Jetzt hochladen' : 'Jetzt anmelden' }}
    </a>

    <span class="hint" *ngIf="!auth.isLoggedIn()">Anmeldung erforderlich</span>
  </div>
</section>
