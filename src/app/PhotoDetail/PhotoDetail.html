<div
  class="pd-overlay"
  *ngIf="photoId !== null || isClosing"
  [class.pd-closing]="isClosing"
  (click)="onBackdropClick()"
>
  <div class="pd-dialog" (click)="onDialogClick($event)">
    <button class="pd-close" (click)="requestClose()" aria-label="Schließen">
      <i class="ti ti-x"></i>
    </button>

    <!-- Ladezustand -->
    <div class="pd-loading" *ngIf="isLoading">
      <div class="pd-skeleton-image"></div>
      <div class="pd-skeleton-info">
        <div class="pd-skeleton-line w-60"></div>
        <div class="pd-skeleton-line w-40"></div>
        <div class="pd-skeleton-line w-80"></div>
        <div class="pd-skeleton-line w-80"></div>
        <div class="pd-skeleton-line w-30"></div>
      </div>
    </div>

    <!-- Fehler -->
    <div class="pd-error" *ngIf="!isLoading && errorMsg">
      <i class="ti ti-photo-off"></i>
      <p>{{ errorMsg }}</p>
    </div>

    <!-- Inhalt -->
    <ng-container *ngIf="!isLoading && !errorMsg && photo as p">
      <div class="pd-image-side" (dblclick)="onImageDoubleClick()">
        <img [src]="p.url" [alt]="'Foto von ' + p.photographer" />
        <i class="ti ti-heart-filled pd-heart-burst" *ngIf="showHeartBurst"></i>
      </div>

      <div class="pd-info-side">
        <div class="pd-info-header">
          <div class="pd-avatar">{{ p.photographer.charAt(0).toUpperCase() }}</div>
          <div class="pd-header-text">
            <span class="pd-photographer">{{ p.photographer }}</span>
            <span class="pd-location" *ngIf="p.location">
              <i class="ti ti-map-pin"></i> {{ p.location }}
            </span>
          </div>
        </div>

        <div class="pd-info-body">
          <h2 class="pd-title" *ngIf="p.title">{{ p.title }}</h2>
          <p class="pd-description" *ngIf="p.description">{{ p.description }}</p>

          <div class="pd-categories" *ngIf="p.categories.length">
            <span class="pd-category-chip" *ngFor="let kat of p.categories">{{ kat }}</span>
          </div>

          <div class="pd-specs" *ngIf="specEntries.length">
            <div class="pd-spec" *ngFor="let spec of specEntries">
              <i class="ti" [ngClass]="spec.icon"></i>
              <div>
                <span class="pd-spec-label">{{ spec.label }}</span>
                <span class="pd-spec-value">{{ spec.value }}</span>
              </div>
            </div>
          </div>

          <div class="pd-date" *ngIf="p.createdAt">
            <i class="ti ti-calendar"></i>
            <span>{{ p.createdAt | date: 'dd.MM.yyyy' }}</span>
          </div>
        </div>

        <div class="pd-footer">
          <button
            class="pd-like-btn"
            [class.liked]="p.liked"
            (click)="toggleLike()"
            [attr.aria-pressed]="p.liked"
          >
            <i class="ti" [class.ti-heart]="!p.liked" [class.ti-heart-filled]="p.liked"></i>
            <span>{{ p.likes }} {{ p.likes === 1 ? 'Like' : 'Likes' }}</span>
          </button>
        </div>
      </div>
    </ng-container>
  </div>
</div>
